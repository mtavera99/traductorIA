name: Publicar VozPuente en GitHub Pages

# Se ejecuta al hacer push a main (y se puede lanzar a mano desde la pestaña
# Actions). Compila el app en un solo archivo y lo publica en GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos mínimos que necesita el despliegue a Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues solapados; deja siempre el último.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        working-directory: "voice-translator 4"
        run: npm ci

      - name: Compilar (archivo único)
        working-directory: "voice-translator 4"
        env:
          SINGLEFILE: "1"
        run: npm run build

      - name: Preparar carpeta de publicación
        run: |
          mkdir -p _site
          cp "voice-translator 4/dist/index.html" _site/index.html
          cp "voice-translator 4/dist/mic.svg" _site/mic.svg || true

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          # Intenta habilitar Pages automáticamente (si el repo lo permite).
          enablement: true

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
